<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSO Agent - User Dashboard</title>
    <link rel="stylesheet" href="../css/style.css">
    <link href="https://fonts.googleapis.com/css2?css2=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body data-theme="dark">

    <aside class="sidebar glass-card">
        <div class="logo"><i class="fas fa-robot"></i> JSO Agent</div>
        <nav>
            <a href="user.html" class="nav-link active"><i class="fas fa-user"></i> Job Seeker</a>
            <a href="hr.html" class="nav-link"><i class="fas fa-briefcase"></i> HR Consultant</a>
            <a href="admin.html" class="nav-link"><i class="fas fa-chart-line"></i> Admin</a>
            <a href="licensing.html" class="nav-link"><i class="fas fa-certificate"></i> Licensing</a>
        </nav>
    </aside>

    <main class="main-content">
        <header class="header">
            <h1>User Dashboard</h1>
            <button class="theme-toggle" id="theme-toggle"><i class="fas fa-moon"></i></button>
        </header>

        <section class="glass-card">
            <h2>Generate Optimized Query</h2>
            <form id="query-form">
                <div class="dashboard-grid">
                    <div class="form-group">
                        <label for="role">Job Role</label>
                        <input type="text" id="role" placeholder="e.g., Machine Learning Engineer" required>
                    </div>
                    <div class="form-group">
                        <label for="experience">Experience</label>
                        <select id="experience" required>
                            <option value="Entry Level">Entry Level</option>
                            <option value="1-3 years">1-3 years</option>
                            <option value="3-5 years">3-5 years</option>
                            <option value="5+ years">5+ years</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="location">Location</label>
                        <input type="text" id="location" placeholder="e.g., India" required>
                    </div>
                    <div class="form-group">
                        <label for="platform">Target Platform</label>
                        <select id="platform" required>
                            <option value="LinkedIn">LinkedIn</option>
                            <option value="Indeed">Indeed</option>
                            <option value="Naukri">Naukri</option>
                            <option value="Glassdoor">Glassdoor</option>
                            <option value="Reed">Reed</option>
                            <option value="TotalJobs">TotalJobs</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label for="skills">Skills (comma separated)</label>
                    <input type="text" id="skills" placeholder="e.g., Python, TensorFlow, PyTorch" required>
                </div>
                
                <button type="submit" id="generate-btn">
                    <i class="fas fa-magic"></i> Generate Query
                </button>
                <div id="loading" class="spinner hidden" style="margin-left: 10px; vertical-align: middle;"></div>
            </form>
        </section>

        <section class="glass-card hidden" id="results-section">
            <h2>Generated Results</h2>
            
            <div class="form-group">
                <label>Boolean Query</label>
                <div class="output-panel" id="boolean-output"></div>
            </div>

            <div class="form-group">
                <label>X-Ray Query</label>
                <div class="output-panel" id="xray-output"></div>
            </div>

            <div class="form-group">
                <label>Search Links</label>
                <ul class="links-list" id="links-output"></ul>
            </div>
        </section>
    </main>

    <script src="../js/api.js"></script>
    <script src="../js/user.js"></script>
</body>
</html>

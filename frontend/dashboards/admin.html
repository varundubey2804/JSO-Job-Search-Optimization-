<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSO Agent - Admin Dashboard</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body data-theme="dark">

    <aside class="sidebar glass-card">
        <div class="logo"><i class="fas fa-robot"></i> JSO Agent</div>
        <nav>
            <a href="user.html" class="nav-link"><i class="fas fa-user"></i> Job Seeker</a>
            <a href="hr.html" class="nav-link"><i class="fas fa-briefcase"></i> HR Consultant</a>
            <a href="admin.html" class="nav-link active"><i class="fas fa-chart-line"></i> Admin</a>
            <a href="licensing.html" class="nav-link"><i class="fas fa-certificate"></i> Licensing</a>
        </nav>
    </aside>

    <main class="main-content">
        <header class="header">
            <h1>Super Admin Dashboard</h1>
            <button class="theme-toggle" id="theme-toggle"><i class="fas fa-moon"></i></button>
        </header>

        <section class="dashboard-grid">
            <div class="glass-card widget">
                <h3>Total Queries Generated</h3>
                <div class="widget-value" id="total-queries">--</div>
            </div>
            <div class="glass-card widget">
                <h3>Active Users</h3>
                <div class="widget-value" id="active-users">--</div>
            </div>
            <div class="glass-card widget">
                <h3>System Health</h3>
                <div class="widget-value" style="color: var(--secondary-color);">99.9%</div>
            </div>
        </section>

        <section class="glass-card">
            <h2>Top Job Roles Searched</h2>
            <table>
                <thead>
                    <tr>
                        <th>Job Role</th>
                        <th>Search Count</th>
                    </tr>
                </thead>
                <tbody id="top-roles-body">
                    <!-- Dynamic -->
                </tbody>
            </table>
        </section>

        <section class="glass-card">
            <h2>Recent AI Logs</h2>
            <table>
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>User ID</th>
                        <th>Role Searched</th>
                        <th>Platform</th>
                    </tr>
                </thead>
                <tbody id="ai-logs-body">
                    <!-- Dynamic -->
                </tbody>
            </table>
        </section>
    </main>

    <script src="../js/api.js"></script>
    <script src="../js/admin.js"></script>
</body>
</html>
